<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Progress</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px 16px;
            text-align: center;
            font-size: 13px;
        }

        th:first-child {
            text-align: left;
        }

        td {
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #333;
        }

        td:first-child {
            text-align: left;
            font-weight: bold;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        input[type="checkbox"]:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            accent-color: #999;
        }

        .add-task-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .add-task-btn:hover {
            background-color: #45a049;
        }

        .delete-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .delete-btn:hover {
            background-color: #c62828;
        }

        .today-col {
            background-color: #f1f8e9;
        }

        .logout-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
        }

        .logout-btn:hover {
            background-color: #c62828;
        }

        .today-col {
            background-color: #fff3e0; /* ← warm orange instead of green */
        }

        th.today-col {
            background-color: #FF9800 !important; /* ← orange header for today */
        }
    </style>
</head>
<body>

<h2>Task Progress</h2>

<table>
    <tr>
        <th>Task</th>
        <th th:each="day : ${last10Days}"
            th:text="${day}"
            th:classappend="${day == today} ? 'today-col' : ''"></th>
        <th>Action</th>
    </tr>
    <tr th:each="task : ${tasks}">
        <td th:text="${task.title}"></td>
        <td th:each="day : ${last10Days}"
            th:classappend="${day == today} ? 'today-col' : ''">
            <input type="checkbox"
                   th:checked="${#lists.contains(completedDatesMap[task.id], day)}"
                   th:attr="data-task-id=${task.id}, data-date=${day}"
                   th:disabled="${day != today}"
                   class="progress-checkbox"/>
        </td>
        <td>
            <a th:href="@{/api/v1/deleteTask(taskId=${task.id})}"
               onclick="return confirm('Are you sure?')">
                <button class="delete-btn">🗑️ Delete</button>
            </a>
        </td>
    </tr>
</table>

<a href="/addTask" class="add-task-btn">+ Add Task</a>

<form th:action="@{/logout}" method="post">
    <button type="submit" class="logout-btn">🚪 Logout</button>
</form>

<script>
    document.querySelectorAll('.progress-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const taskId = this.getAttribute('data-task-id');
            const date = this.getAttribute('data-date');
            const completed = this.checked;

            fetch('/api/v1/updateProgress', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId, date, completed })
            });
        });
    });
</script>

</body>
</html>
