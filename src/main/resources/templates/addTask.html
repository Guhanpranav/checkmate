<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Task</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 24px;
            color: #333;
            font-size: 22px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4CAF50;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .add-btn:hover {
            background-color: #45a049;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover {
            color: #4CAF50;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ Add New Task</h2>
    <form th:action="@{/api/v1/addTask}" method="post">
        <input type="text" name="title" placeholder="Enter task title" required/>
        <button type="submit" class="add-btn">Add Task</button>
    </form>
    <a href="/api/v1/home" class="back-link">← Back to Home</a>
</div>

</body>
</html>
